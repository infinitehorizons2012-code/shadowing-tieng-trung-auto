name: Chinese Shadowing Pipeline (Hybrid)

on:
  workflow_dispatch:
    inputs:
      gdrive_file_link:
        description: 'Đường dẫn Google Drive của file gpu_analysis.json (do Colab tạo ra)'
        required: true

jobs:
  build-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          pip install pypinyin openai jieba google-api-python-client google-auth-httplib2 google-auth-oauthlib requests

      - name: 1. Download Analysis from Google Drive
        env:
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
          GDRIVE_FILE_LINK: ${{ github.event.inputs.gdrive_file_link }}
        run: |
          python download_from_gdrive.py

      - name: 2. Translate, Pinyin & Jieba (DeepSeek + pypinyin)
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          python translator.py

      - name: 3. Compile Web App
        run: |
          python compiler.py
          python packager.py
          
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v3
        with:
          name: shadowing-app-build
          path: build.zip
